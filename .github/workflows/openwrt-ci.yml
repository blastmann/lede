name: OpenWrt-CI

on:
  workflow_dispatch:
  schedule:
    - cron: 0 20 * * *

permissions:
  contents: read

jobs:

  build_openwrt:

    name: Build OpenWrt Firmware

    runs-on: ubuntu-22.04

    steps:
      - name: Space cleanup and Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker image prune -f
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
          sudo -E apt-mark hold grub-efi-amd64-signed
          sudo -E apt update
          sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
          sudo -E apt -y full-upgrade
          sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E systemctl daemon-reload
          sudo -E apt -y autoremove --purge
          sudo -E apt clean
          sudo -E timedatectl set-timezone "Asia/Shanghai"

      - name: Checkout OpenWrt
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # if set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Update feeds
        run: |
          sed -i 's/#src-git helloworld/src-git helloworld/g' ./feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Integrate OpenClash
        run: |
          rm -rf package/feeds/luci/luci-app-openclash package/luci-app-openclash
          mkdir -p package/luci-app-openclash
          pushd package/luci-app-openclash
          git init
          git remote add -f origin https://github.com/vernesong/OpenClash.git
          git config core.sparsecheckout true
          echo "luci-app-openclash" >> .git/info/sparse-checkout
          git pull --depth 1 origin master
          git branch --set-upstream-to=origin/master master
          shopt -s dotglob nullglob
          mv luci-app-openclash/* .
          rmdir luci-app-openclash
          popd
          pushd package/luci-app-openclash/tools/po2lmo
          make
          sudo make install
          popd

      - name: Generate base configuration file
        run: |
          echo 'CONFIG_TARGET_x86=y' > .config
          echo 'CONFIG_TARGET_x86_64=y' >> .config
          echo 'CONFIG_TARGET_x86_64_Generic=y' >> .config
          echo 'CONFIG_TARGET_ARCH_PACKAGES="x86_64"' >> .config
          echo 'CONFIG_PACKAGE_luci-app-openclash=y' >> .config
          make defconfig

      - name: Resolve OpenClash dependencies
        run: |
          echo 'CONFIG_PACKAGE_dnsmasq-full=y' >> .config
          echo 'CONFIG_PACKAGE_bash=y' >> .config
          echo 'CONFIG_PACKAGE_curl=y' >> .config
          echo 'CONFIG_PACKAGE_ca-bundle=y' >> .config
          echo 'CONFIG_PACKAGE_ip-full=y' >> .config
          echo 'CONFIG_PACKAGE_ruby=y' >> .config
          echo 'CONFIG_PACKAGE_ruby-yaml=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-tun=y' >> .config
          echo 'CONFIG_PACKAGE_kmod-inet-diag=y' >> .config
          echo 'CONFIG_PACKAGE_luci-compat=y' >> .config
          echo 'CONFIG_PACKAGE_unzip=y' >> .config
          if grep -q '^CONFIG_PACKAGE_firewall4=y' .config; then
            echo 'CONFIG_PACKAGE_kmod-nft-tproxy=y' >> .config
            echo 'CONFIG_PACKAGE_dnsmasq_full_nftset=y' >> .config
          else
            echo 'CONFIG_PACKAGE_kmod-ipt-nat=y' >> .config
            echo 'CONFIG_PACKAGE_ip6tables-mod-nat=y' >> .config
            echo 'CONFIG_PACKAGE_iptables-mod-tproxy=y' >> .config
            echo 'CONFIG_PACKAGE_iptables-mod-extra=y' >> .config
            echo 'CONFIG_PACKAGE_ipset=y' >> .config
            echo 'CONFIG_PACKAGE_dnsmasq_full_ipset=y' >> .config
          fi
          make defconfig

      - name: Preload OpenClash runtime assets
        run: |
          PKG_ROOT="package/luci-app-openclash/root"
          UI_ROOT="$PKG_ROOT/usr/share/openclash/ui"
          CORE_ROOT="$PKG_ROOT/etc/openclash/core"
          TMP_DIR="$(mktemp -d)"
          ARCH_PACKAGES="$(sed -n 's/^CONFIG_TARGET_ARCH_PACKAGES=\"\\(.*\\)\"$/\\1/p' .config | head -n1)"

          mkdir -p "$UI_ROOT/dashboard" "$UI_ROOT/yacd" "$UI_ROOT/zashboard" "$UI_ROOT/metacubexd" "$CORE_ROOT"

          download_and_unpack_zip() {
            local url="$1"
            local include_dir="$2"
            local target_dir="$3"
            local zip_path="$TMP_DIR/$(basename "$target_dir").zip"
            local unpack_dir="$TMP_DIR/$(basename "$target_dir")"

            rm -rf "$zip_path" "$unpack_dir"
            curl -fL --retry 3 --connect-timeout 30 "$url" -o "$zip_path"
            unzip -q "$zip_path" -d "$unpack_dir"
            rm -rf "$target_dir"
            mkdir -p "$target_dir"
            cp -a "$unpack_dir/$include_dir"/. "$target_dir/"
          }

          download_and_unpack_zip "https://codeload.github.com/ayanamist/clash-dashboard/zip/refs/heads/gh-pages" "clash-dashboard-gh-pages" "$UI_ROOT/dashboard"
          download_and_unpack_zip "https://codeload.github.com/MetaCubeX/Yacd-meta/zip/refs/heads/gh-pages" "Yacd-meta-gh-pages" "$UI_ROOT/yacd"
          download_and_unpack_zip "https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip" "dist" "$UI_ROOT/zashboard"
          download_and_unpack_zip "https://codeload.github.com/MetaCubeX/metacubexd/zip/refs/heads/gh-pages" "metacubexd-gh-pages" "$UI_ROOT/metacubexd"

          case "$ARCH_PACKAGES" in
            aarch64_*) OPENCLASH_CORE_ARCH="linux-arm64" ;;
            arm_cortex-a*|arm_*neon*|arm_*vfpv3*|arm_*vfpv4*) OPENCLASH_CORE_ARCH="linux-armv7" ;;
            arm_arm1176jzf-s_vfp|arm_*arm11*|arm_*vfp) OPENCLASH_CORE_ARCH="linux-armv6" ;;
            arm_*) OPENCLASH_CORE_ARCH="linux-armv5" ;;
            i386*|i486*|i586*|i686*) OPENCLASH_CORE_ARCH="linux-386" ;;
            mips64_*) OPENCLASH_CORE_ARCH="linux-mips64" ;;
            mipsel_*) OPENCLASH_CORE_ARCH="linux-mipsle-softfloat" ;;
            mips_*) OPENCLASH_CORE_ARCH="linux-mips-softfloat" ;;
            x86_64) OPENCLASH_CORE_ARCH="linux-amd64" ;;
            *)
              echo "Unsupported OpenClash core architecture for ARCH_PACKAGES=$ARCH_PACKAGES"
              exit 1
              ;;
          esac

          curl -fL --retry 3 --connect-timeout 30 \
            "https://raw.githubusercontent.com/vernesong/OpenClash/core/master/meta/clash-${OPENCLASH_CORE_ARCH}.tar.gz" \
            -o "$TMP_DIR/clash_meta.tar.gz"
          tar -xzf "$TMP_DIR/clash_meta.tar.gz" -C "$TMP_DIR"
          install -m 4755 "$TMP_DIR/clash" "$CORE_ROOT/clash_meta"
          rm -rf "$TMP_DIR"

      - name: Download packages
        run: make download -j16

      - name: Compile firmware
        run: |
          make -j$(nproc) || make -j1 V=s
          echo "======================="
          echo "Space usage:"
          echo "======================="
          df -h
          echo "======================="
          du -h --max-depth=1 ./ --exclude=build_dir --exclude=bin
          du -h --max-depth=1 ./build_dir
          du -h --max-depth=1 ./bin

      - name: Prepare artifact
        run: |
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          rm -rf $(find ./bin/targets/ -type d -name "packages")
          cp -rf $(find ./bin/packages/ -type f -name "*.ipk") ./artifact/package/
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/

      - name: Upload buildinfo
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_buildinfo
          path: ./artifact/buildinfo/

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_package
          path: ./artifact/package/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt_firmware
          path: ./bin/targets/
